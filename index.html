<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Hero Quest RPG</title>

<style>
body{
    background:black;
    color:crimson;
    text-align:center;
    font-family:Arial;
    overflow-x:hidden;
}

button,input{
    padding:10px;
    margin:5px;
    border:none;
    border-radius:5px;
}

button{
    background:crimson;
    color:white;
    cursor:pointer;
}

button:hover{
    background:indigo;
}

#hud{
    position:absolute;
    top:10px;
    left:10px;
    color:white;
    text-align:left;
    border:1px solid crimson;
    padding:10px;
    width:135px;
    background:black;
}

#game{
    margin-left:180px;
    margin-top:40px;
    padding:20px;
    text-align:center;
}
</style>
</head>

<body>

<h1 id="title">Hero Quest</h1>

<input id="username" placeholder="USERNAME"><br>

<div id="classSelect">
<button onclick="setClass('Swordsman')">Swordsman</button>
<button onclick="setClass('Mage')">Mage</button>
<button onclick="setClass('Thief')">Thief</button>
</div>

<button id="startBtn" onclick="startGame()">START / LOAD</button>

<div id="hud"></div>
<div id="game"></div>

<script>

/* ================= PLAYER ================= */

const defaultPlayer = () => ({

    name:"",
    class:"",

    hp:50,
    maxHp:50,

  mp:10,
  maxMp: 12,

    str:10,
    def:10,
    agi:10,

    gold:0,

    level:1,
    xp:0,
    nextLevelXp:50,
    skillPoints:0,

    inventory:[],

    equipment:{
        weapon:null,
        armor:null
    },

    story:"village",

    flags:{
        elderQuest:false,
        goblinChiefDead:false,
        cryptUnlocked:false,
        necromancerDead:false,
        dragonDead:false
    }
});

let player = defaultPlayer();

let currentEnemy = null;
let returnNode = "village";

/* ================= HUD ================= */

function updateHUD(){

    let weapon = player.equipment.weapon || "None";
    let armor = player.equipment.armor || "None";

    document.getElementById("hud").innerHTML = `

    <b>${player.name || "No Name"}</b><br>
    ${player.class || "No Class"}<br><br>

    HP: ${player.hp}/${player.maxHp}<br>
    MP: ${player.mp}/${player.maxMp}<br>
    Gold: ${player.gold}<br><br>

    STR: ${player.str}<br>
    DEF: ${player.def}<br>
    AGI: ${player.agi}<br><br>

    LVL: ${player.level}<br>
    XP: ${player.xp}/${player.nextLevelXp}<br>
    SkillPts: ${player.skillPoints}<br><br>

    Weapon: ${weapon}<br>
    Armor: ${armor}<br><br>

    Items:<br>
    ${player.inventory.length ? player.inventory.join(", ") : "None"}
    `;
}

/* ================= CLASS ================= */

function setClass(c){

    player.class = c;

    if(c === "Swordsman"){
        player.str = 15;
        player.def = 12;
        player.agi = 11;
        player.maxMP = 2;
    }

    if(c === "Mage"){
        player.str = 5;
        player.def = 3;
        player.agi = 15;
        player.maxMP = 17;
    }

    if(c === "Rogue"){
        player.str = 10;
        player.def = 8;
        player.agi = 17;
        player.maxMP = 5;
    }

    updateHUD();
}

/* ================= SAVE / LOAD ================= */

function saveGame(){

    localStorage.setItem(
        "hero_" + player.name,
        JSON.stringify(player)
    );
}

function loadGame(name){

    let data = localStorage.getItem("hero_" + name);

    if(!data) return false;

    player = JSON.parse(data);

    return true;
}

/* ================= START GAME ================= */

function startGame(){

    let name = document.getElementById("username").value.trim();

    if(!name){
        alert("Enter username!");
        return;
    }

    if(!loadGame(name)){

        if(!player.class){
            alert("Pick a class!");
            return;
        }

        player.name = name;

        saveGame();
    }

    document.getElementById("title").style.display = "none";
    document.getElementById("username").style.display = "none";
    document.getElementById("classSelect").style.display = "none";
    document.getElementById("startBtn").style.display = "none";

    updateHUD();

    loadStory();
}

/* ================= STORY ================= */

const story = {

village:{
    text:"The village of Ashmoor trembles in fear. Monsters roam the wilds at night.",
    choices:[
        {text:"Talk to Elder", next:"elder"},
        {text:"Visit Shop", next:"shop"},
        {text:"Go to Forest", next:"forest"},
        {text:"Open Skills", action:openSkills},
        {text:"Check Inventory", action:openInventory}
    ]
},

elder:{
    text:"Elder Rowan: 'Darkness spreads beyond the forest. We need a hero.'",
    choices:[
        {text:"Accept Quest", next:"questAccepted"},
        {text:"Back", next:"village"}
    ]
},

questAccepted:{
    text:"The Elder asks you to slay the Goblin Chief hidden deep in the forest.",
    action:()=>{

        player.flags.elderQuest = true;

        saveGame();

        document.getElementById("game").innerHTML = `
        <p>Quest Started: Defeat the Goblin Chief</p>
        <button onclick="go('forest')">Enter Forest</button>
        `;
    },
    choices:[]
},

shop:{
    text:"A tired merchant greets you.",
    choices:[
        {text:"Buy Potion (15 Gold)", action:buyPotion},
        {text:"Back", next:"village"}
    ]
},

forest:{
    text:"The forest is filled with glowing eyes and distant growls.",
    action:()=>startExploration("forest","village"),
    choices:[]
},

cryptEntrance:{
    text:"Behind the Goblin Chief's camp lies an ancient crypt.",
    choices:[
        {text:"Enter Crypt", next:"crypt"},
        {text:"Return to Village", next:"village"}
    ]
},

crypt:{
    text:"Undead creatures rise from the darkness.",
    action:()=>startExploration("crypt","cryptEntrance"),
    choices:[]
},

necromancerRoom:{
    text:"The Necromancer Lord waits beside a cursed altar.",
    choices:[
        {text:"Fight Necromancer", action:startNecromancerFight},
        {text:"Retreat", next:"cryptEntrance"}
    ]
},

dragonMountain:{
    text:"At the peak of the mountain, the Ancient Dragon awakens.",
    choices:[
        {text:"Fight Dragon", action:startDragonFight},
        {text:"Retreat", next:"village"}
    ]
},

ending:{
    text:"With the Ancient Dragon defeated, the kingdom is finally safe. The people of Ashmoor celebrate your name for generations.",
    choices:[
        {text:"Continue Exploring", next:"village"}
    ]
}

};

/* ================= STORY ENGINE ================= */

function loadStory(){

    let node = story[player.story];

    if(!node){
        player.story = "village";
        node = story[player.story];
    }

    if(node.action){
        node.action();
        return;
    }

    let html = `<p>${node.text}</p>`;

    node.choices.forEach(choice => {

        if(choice.action){

            html += `
            <button onclick="${choice.action.name}()">
            ${choice.text}
            </button>
            `;

        }else{

            html += `
            <button onclick="go('${choice.next}')">
            ${choice.text}
            </button>
            `;
        }
    });

    document.getElementById("game").innerHTML = html;
}

/* ================= NAVIGATION ================= */

function go(next){

    player.story = next;

    saveGame();

    loadStory();
}

/* ================= EXPLORATION ================= */

function startExploration(area,returnTo){

    returnNode = returnTo;

    if(Math.random() < 0.75){

        startCombat(randomEnemy());

    }else{

        player.inventory.push("Herb");

        updateHUD();

        saveGame();

        document.getElementById("game").innerHTML = `
        <p>You found an Herb!</p>
        <button onclick="endActivity()">Continue</button>
        `;
    }
}

function endActivity(){

    player.story = returnNode;

    saveGame();

    loadStory();
}

/* ================= COMBAT ================= */

function startCombat(enemy){

    currentEnemy = {...enemy};

    renderCombat();

    if(currentEnemy.agi > player.agi){
        enemyTurn();
    }
}

function renderCombat(){

    updateHUD();

    document.getElementById("game").innerHTML = `
    <h2>${currentEnemy.name}</h2>

    <p>
    Enemy HP: ${currentEnemy.hp}
    </p>

    <button onclick="attack()">Attack</button>
    <button onclick="defend()">Defend</button>
    <button onclick="run()">Run</button>
    `;
}

function calcDamage(att,def){

    return Math.max(
        1,
        Math.floor(att - (def / 2))
    );
}

function attack(){

    currentEnemy.hp -= calcDamage(
        player.str,
        currentEnemy.def
    );

    if(currentEnemy.hp <= 0){
        winCombat();
        return;
    }

    enemyTurn();
}

function defend(){

    let originalDef = player.def;

    player.def += 3;

    enemyTurn();

    player.def = originalDef;
}

function run(){

    document.getElementById("game").innerHTML = `
    <p>You escaped safely.</p>
    <button onclick="endActivity()">Continue</button>
    `;
}

function enemyTurn(){

    player.hp -= calcDamage(
        currentEnemy.str,
        player.def
    );

    if(player.hp <= 0){

        player.hp = 0;

        updateHUD();

        document.getElementById("game").innerHTML = `
        <h1>GAME OVER</h1>
        <button onclick="location.reload()">Restart</button>
        `;

        return;
    }

    updateHUD();

    renderCombat();
}

function winCombat(){

    player.xp += currentEnemy.xp;

    let loot = generateLoot(currentEnemy);

    while(player.xp >= player.nextLevelXp){

        player.xp -= player.nextLevelXp;

        player.level++;

        player.skillPoints++;

        player.str += 2;
        player.def += 1;
        player.agi += 2;

        player.maxHp += 7;
        player.hp = player.maxHp;
        player.mxMP += 1;
        player.mp = player.maxMP;

        player.nextLevelXp = Math.floor(
            player.nextLevelXp * 1.35
        );
    }

    if(currentEnemy.name === "Goblin Chief"){

        player.flags.goblinChiefDead = true;

        player.flags.cryptUnlocked = true;

        player.story = "cryptEntrance";
    }

    if(currentEnemy.name === "Necromancer"){

        player.flags.necromancerDead = true;

        player.story = "dragonMountain";
    }

    if(currentEnemy.name === "Ancient Dragon"){

        player.flags.dragonDead = true;

        player.story = "ending";
    }

    saveGame();

    updateHUD();

    document.getElementById("game").innerHTML = `

    <h2>Victory!</h2>

    <p>You defeated the ${currentEnemy.name}.</p>

    <p>Loot Found:</p>

    <p>${loot.join("<br>")}</p>

    <button onclick="endAfterBattle()">
    Continue
    </button>
    `;
}

/* ================= ENEMIES ================= */

function randomEnemy(){

    let enemies = [

        {
            name:"Wolf",
            hp:40,
            str:10,
            def:5,
            agi:8,
            xp:15
        },

        {
            name:"Goblin",
            hp:55,
            str:12,
            def:6,
            agi:6,
            xp:20
        },

        {
            name:"Dark Slime",
            hp:35,
            str:8,
            def:3,
            agi:4,
            xp:12
        }

    ];

    if(player.flags.elderQuest && !player.flags.goblinChiefDead){

        if(Math.random() < 0.20){

            return {
                name:"Goblin Chief",
                hp:120,
                str:18,
                def:10,
                agi:10,
                xp:50
            };
        }
    }

    if(player.story === "crypt"){

        if(Math.random() < 0.25){

            return {
                name:"Necromancer",
                hp:180,
                str:24,
                def:12,
                agi:12,
                xp:80
            };
        }
    }

    return enemies[
        Math.floor(Math.random() * enemies.length)
    ];
}

/* ================= LOOT ================= */

function generateLoot(enemy){

    let drops = [];

    let gold = Math.floor(Math.random()*20)+5;

    player.gold += gold;

    drops.push(gold + " Gold");

    if(Math.random() < 0.35){

        player.inventory.push("Potion");

        drops.push("Potion");
    }

    if(enemy.name === "Goblin Chief" && Math.random() < 0.50){

        player.inventory.push("Chief's Blade");

        drops.push("RARE: Chief's Blade");
    }

    if(enemy.name === "Necromancer" && Math.random() < 0.35){

        player.inventory.push("Shadow Robe");

        drops.push("EPIC: Shadow Robe");
    }

    if(enemy.name === "Ancient Dragon"){

        player.inventory.push("Dragon Fang");

        drops.push("LEGENDARY: Dragon Fang");
    }

    return drops;
}

/* ================= SKILLS ================= */

function openSkills(){

    document.getElementById("game").innerHTML = `
    <h2>Skill Tree</h2>

    <p>Available Points: ${player.skillPoints}</p>

    <button onclick="upgrade('str')">
    +STR
    </button>

    <button onclick="upgrade('def')">
    +DEF
    </button>

    <button onclick="upgrade('agi')">
    +AGI
    </button>

   <button onclick="upgrade('maxMP')">
    +MP
    </button>

    <br><br>

    <button onclick="loadStory()">
    Back
    </button>
    `;
}

function upgrade(stat){

    if(player.skillPoints <= 0){

        alert("No skill points!");

        return;
    }

    player[stat] += 2;

    player.skillPoints--;

    saveGame();

    updateHUD();

    openSkills();
}

/* ================= INVENTORY ================= */

function openInventory(){

    let html = `
    <h2>Inventory</h2>
    `;

    if(player.inventory.length === 0){

        html += `<p>Empty</p>`;

    }else{

        player.inventory.forEach(item => {
            html += `<p>${item}</p>`;
        });
    }

    html += `
    <button onclick="loadStory()">
    Back
    </button>
    `;

    document.getElementById("game").innerHTML = html;
}

/* ================= SHOP ================= */

function buyPotion(){

    if(player.gold < 15){

        alert("Not enough Gold!");

        return;
    }

    player.gold -= 15;

    player.inventory.push("Potion");

    saveGame();

    updateHUD();

    alert("Potion Purchased!");
}

/* ================= BOSS FIGHTS ================= */

function startNecromancerFight(){

    startCombat({
        name:"Necromancer",
        hp:180,
        str:24,
        def:12,
        agi:12,
        xp:80
    });
}

function startDragonFight(){

    startCombat({
        name:"Ancient Dragon",
        hp:300,
        str:35,
        def:18,
        agi:15,
        xp:150
    });
}

/* ================= BATTLE END ================= */

function endAfterBattle(){

    saveGame();

    if(player.story === "ending"){
        loadStory();
        return;
    }

    if(player.story === "cryptEntrance"){
        loadStory();
        return;
    }

    if(player.story === "dragonMountain"){
        loadStory();
        return;
    }

    endActivity();
}

/* ================= INIT ================= */

updateHUD();

</script>
</body>
</html>
