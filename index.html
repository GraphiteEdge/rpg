<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Hero Quest RPG</title>

<style>
body {
  background:black;
  color:crimson;
  text-align:center;
  font-family:Arial;
}

button, input {
  padding:10px;
  margin:5px;
  border:none;
  border-radius:5px;
}

button {
  background:crimson;
  color:white;
}

button:hover {
  background:indigo;
}

#hud {
  position:absolute;
  top:10px;
  left:10px;
  color:white;
  text-align:left;
}
</style>
</head>

<body>

<h1 id="title">Hero Quest</h1>

<input id="username" placeholder="USERNAME"><br>

<div id="classSelect">
<button onclick="setClass('Warrior')">Warrior</button>
<button onclick="setClass('Mage')">Mage</button>
<button onclick="setClass('Rogue')">Rogue</button>
</div>

<button onclick="startGame()">START / LOAD</button>

<div id="hud"></div>
<div id="game"></div>

<script>

/* ===== PLAYER ===== */
let player = {
  name:"",
  class:"",
  hp:100,
  maxHp:100,
  str:10,
  def:10,
  agi:10,
  level:1,
  xp:0,
  skillPoints:0,
  inventory:[],
  story:"village",
  flags:{}
};

let currentEnemy=null;
let returnNode="village";

/* ===== HUD ===== */
function updateHUD(){
document.getElementById("hud").innerHTML=`
<b>${player.name || "No Name"} (${player.class || "No Class"})</b><br>
HP:${player.hp}/${player.maxHp}<br>
STR:${player.str} DEF:${player.def} AGI:${player.agi}<br>
LVL:${player.level} XP:${player.xp}<br>
SkillPts:${player.skillPoints}<br>
Items:${player.inventory.join(", ") || "None"}
`;
}

/* ===== CLASS ===== */
function setClass(c){
player.class=c;

if(c==="Warrior"){ player.str=15; player.def=12; player.agi=5; }
if(c==="Mage"){ player.str=8; player.def=6; player.agi=10; player.mana=50; }
if(c==="Rogue"){ player.str=10; player.def=8; player.agi=15; }

updateHUD();
}

/* ===== SAVE / LOAD ===== */
function saveGame(){
localStorage.setItem("hero_"+player.name,JSON.stringify(player));
}

function loadGame(name){
let d=localStorage.getItem("hero_"+name);
if(!d) return false;
let data=JSON.parse(d);
player={...player,...data};
return true;
}

/* ===== START ===== */
function startGame(){
let name=document.getElementById("username").value.trim();
if(!name) return alert("Enter username!");

if(!loadGame(name)){
if(!player.class) return alert("Pick a class!");
player.name=name;
}

document.getElementById("title").style.display="none";
document.getElementById("username").style.display="none";
document.getElementById("classSelect").style.display="none";
document.querySelectorAll("button").forEach(b=>b.style.display="none");

updateHUD();
loadStory();
}

/* ===== STORY ===== */
const story={

village:{
text:"You arrive in a fearful village. The Elder needs help.",
choices:[
{text:"Talk to Elder", next:"elder"},
{text:"Go to Forest", next:"forest"},
{text:"Open Skills", action:openSkills},
{text:"Check Inventory", action:openInventory}
]
},

elder:{
text:"Elder: 'Clear the forest and return safely.'",
choices:[
{text:"Accept Quest", next:"forest"},
{text:"Back", next:"village"}
]
},

forest:{
text:"The forest is dangerous...",
action:()=>startExploration("forest","village"),
choices:[]
}

};

/* ===== STORY ENGINE ===== */
function loadStory(){
let node=story[player.story];

if(node.action){ node.action(); return; }

let html=`<p>${node.text}</p>`;

node.choices.forEach(c=>{
if(c.action){
html+=`<button onclick="(${c.action})()">${c.text}</button>`;
}else{
html+=`<button onclick="go('${c.next}')">${c.text}</button>`;
}
});

document.getElementById("game").innerHTML=html;
}

function go(next){
player.story=next;
saveGame();
loadStory();
}

/* ===== EXPLORATION ===== */
function startExploration(area,returnTo){
returnNode=returnTo;

if(Math.random()<0.75){
startCombat(randomEnemy());
}else{
player.inventory.push("Herb");
updateHUD();
document.getElementById("game").innerHTML=`
<p>You found an Herb!</p>
<button onclick="endActivity()">Continue</button>`;
}
}

function endActivity(){
player.story=returnNode;
saveGame();
loadStory();
}

/* ===== COMBAT ===== */
function startCombat(enemy){
currentEnemy={...enemy};

if(player.agi>=enemy.agi){
renderCombat();
}else{
enemyTurn();
}
}

function renderCombat(){
document.getElementById("game").innerHTML=`
<p>${currentEnemy.name} HP:${currentEnemy.hp}</p>
<button onclick="attack()">Attack</button>
<button onclick="defend()">Defend</button>
<button onclick="run()">Run</button>
`;
}

function calcDamage(att,def){
return Math.max(1,Math.floor(att - def/2));
}

function attack(){
currentEnemy.hp-=calcDamage(player.str,currentEnemy.def);
if(currentEnemy.hp<=0) return winCombat();
enemyTurn();
}

function defend(){
player.def+=3;
enemyTurn();
player.def-=3;
}

function enemyTurn(){
player.hp-=calcDamage(currentEnemy.str,player.def);

if(player.hp<=0){
document.getElementById("game").innerHTML="<p>You died. Game Over.</p>";
return;
}

updateHUD();
renderCombat();
}

function winCombat(){
player.xp+=20;

if(player.xp>=50){
player.level++;
player.skillPoints++;
player.str+=2;
player.def+=2;
player.agi+=1;
player.maxHp+=10;
player.hp=player.maxHp;
player.xp=0;
}

updateHUD();

document.getElementById("game").innerHTML=`
<p>Victory!</p>
<button onclick="endActivity()">Continue</button>`;
}

/* ===== ENEMIES ===== */
function randomEnemy(){
return {name:"Wolf",hp:40,str:10,def:5,agi:8};
}

/* ===== SKILLS ===== */
function openSkills(){
document.getElementById("game").innerHTML=`
<p>Skill Tree</p>
<button onclick="upgrade('str')">+STR</button>
<button onclick="upgrade('def')">+DEF</button>
<button onclick="upgrade('agi')">+AGI</button>
<button onclick="loadStory()">Back</button>
`;
}

function upgrade(stat){
if(player.skillPoints<=0) return;
player[stat]+=2;
player.skillPoints--;
updateHUD();
openSkills();
}

/* ===== INVENTORY ===== */
function openInventory(){
let html="<p>Inventory</p>";

if(player.inventory.length===0){
html+="<p>Empty</p>";
}else{
player.inventory.forEach((item,i)=>{
html+=`<p>${item}</p>`;
});
}

html+=`<button onclick="loadStory()">Back</button>`;
document.getElementById("game").innerHTML=html;
}

/* ===== INIT ===== */
updateHUD();

</script>
</body>
</html>
