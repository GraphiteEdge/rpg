<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Hero Quest RPG</title>

<style>
body{
    background:black;
    color:crimson;
    text-align:center;
    font-family:Arial;
    overflow-x:hidden;
}

button,input{
    padding:10px;
    margin:5px;
    border:none;
    border-radius:5px;
}

button{
    background:crimson;
    color:white;
    cursor:pointer;
}

button:hover{
    background:indigo;
}

#hud{
    position:fixed;
    top:10px;
    left:10px;
    width:220px;
    min-height:300px;
    color:white;
    text-align:left;
    border:1px solid crimson;
    padding:10px;
    background:black;
    overflow-y:auto;
}

#game{
    margin-left:260px;
    margin-top:40px;
    padding:20px;
    text-align:center;
}
</style>
</head>

<body>

<h1 id="title">Hero Quest</h1>

<input id="username" placeholder="USERNAME"><br>

<div id="classSelect">
<button onclick="setClass('Swordsman')">Swordsman</button>
<button onclick="setClass('Warrior')">Warrior</button>
<button onclick="setClass('Thief')">Thief</button>
</div>

<button id="startBtn" onclick="startGame()">START / LOAD</button>

<div id="hud"></div>
<div id="game"></div>

<script>

/* ================= PLAYER ================= */

const defaultPlayer = () => ({

    name:"",
    playerClass:"",

    hp:100,
    maxHp:100,

    str:10,
    def:10,
    agi:10,

    gold:0,

    level:1,
    xp:0,
    nextLevelXp:50,
    skillPoints:0,

    inventory:[],

    equipment:{
        weapon:null,
        armor:null
    },

    story:"village",
    visitedLocations:["village"],
    unlockedLocations:["village"],

    flags:{
        elderQuest:false,
        goblinChiefDead:false,
        cryptUnlocked:false,
        necromancerDead:false,
        dragonDead:false
    }
});

let player = defaultPlayer();

let currentEnemy = null;
let returnNode = "village";

/* ================= HUD ================= */

function updateHUD(){

    const hud = document.getElementById("hud");

    let weapon = player.equipment.weapon || "None";
    let armor = player.equipment.armor || "None";

    hud.innerHTML = `

    <b>${player.name || "No Name"}</b><br>
    ${player.playerClass || "No Class"}<br><br>

    HP: ${player.hp}/${player.maxHp}<br>
    Gold: ${player.gold}<br><br>

    STR: ${player.str}<br>
    DEF: ${player.def}<br>
    AGI: ${player.agi}<br><br>

    LVL: ${player.level}<br>
    XP: ${player.xp}/${player.nextLevelXp}<br>
    SkillPts: ${player.skillPoints}<br><br>

    Weapon: ${weapon}<br>
    Armor: ${armor}<br><br>

    Items:<br>
    ${player.inventory.length ? player.inventory.join(", ") : "None"}

    <br><br>

    <button onclick="openWorldMap()">
    World Map
    </button>
    `;
}

/* ================= CLASS ================= */

function setClass(c){

    player.playerClass = c;

    player.hp = 100;
    player.maxHp = 100;

    if(c === "Swordsman"){
        player.str = 15;
        player.def = 5;
        player.agi = 10;
    }

    if(c === "Warrior"){
        player.str = 15;
        player.def = 10;
        player.agi = 5;
    }

    if(c === "Thief"){
        player.str = 10;
        player.def = 5;
        player.agi = 15;
    }

    updateHUD();
}

/* ================= SAVE / LOAD ================= */

function saveGame(){

    localStorage.setItem(
        "hero_" + player.name,
        JSON.stringify(player)
    );
}

function loadGame(name){

    let data = localStorage.getItem("hero_" + name);

    if(!data) return false;

    player = JSON.parse(data);

    return true;
}

/* ================= START GAME ================= */

function startGame(){

    let name = document.getElementById("username").value.trim();

    if(!name){
        alert("Enter a username!");
        return;
    }

    if(!loadGame(name)){

        if(!player.playerClass){
            alert("Pick a class!");
            return;
        }

        player.name = name;

        saveGame();
    }

    document.getElementById("title").style.display = "none";
    document.getElementById("username").style.display = "none";
    document.getElementById("classSelect").style.display = "none";
    document.getElementById("startBtn").style.display = "none";

    updateHUD();

    loadStory();
}

/* ================= STORY ================= */

const story = {

village:{
    text:"The village of Ashmoor trembles in fear. Monsters roam the wilds at night.",
    choices:[
        {text:"Talk to Elder", next:"elder"},
        {text:"Visit Shop", next:"shop"},
        {text:"Go to Forest", next:"forest"},
        {text:"Open Skills", action:openSkills},
        {text:"Check Inventory", action:openInventory}
    ]
},

elder:{
    text:"Elder Rowan: 'Darkness spreads beyond the forest. We need a hero.'",
    choices:[
        {text:"Accept Quest", next:"questAccepted"},
        {text:"Back", next:"village"}
    ]
},

questAccepted:{
    text:"The Elder asks you to slay the Goblin Chief hidden deep in the forest.",
    action:()=>{

        player.flags.elderQuest = true;

        saveGame();

        document.getElementById("game").innerHTML = `
        <p>Quest Started: Defeat the Goblin Chief</p>
        <button onclick="go('forest')">Enter Forest</button>
        `;
    },
    choices:[]
},

shop:{
    text:"A tired merchant greets you.",
    choices:[
        {text:"Buy Potion (15 Gold)", action:buyPotion},
        {text:"Back", next:"village"}
    ]
},

forest:{
    text:"The forest is filled with glowing eyes and distant growls.",
    action:()=>startExploration("forest","village"),
    choices:[]
},

cryptEntrance:{
    text:"Behind the Goblin Chief's camp lies an ancient crypt.",
    choices:[
        {text:"Enter Crypt", next:"crypt"},
        {text:"Return to Village", next:"village"}
    ]
},

crypt:{
    text:"Undead creatures rise from the darkness.",
    action:()=>startExploration("crypt","cryptEntrance"),
    choices:[]
},

dragonMountain:{
    text:"At the peak of the mountain, the Ancient Dragon awakens.",
    choices:[
        {text:"Fight Dragon", action:startDragonFight},
        {text:"Retreat", next:"village"}
    ]
},

ending:{
    text:"With the Ancient Dragon defeated, the kingdom is finally safe.",
    choices:[
        {text:"Continue Exploring", next:"village"}
    ]
}

};

/* ================= STORY ENGINE ================= */

function loadStory(){

    let node = story[player.story];

    if(!node){
        player.story = "village";
        node = story[player.story];
    }

    if(node.action){
        node.action();
        return;
    }

    let html = `<p>${node.text}</p>`;

    node.choices.forEach(choice => {

        if(choice.action){

            const actionName = choice.action.name;

            html += `
            <button onclick="${actionName}()">
            ${choice.text}
            </button>
            `;

        }else{

            html += `
            <button onclick="go('${choice.next}')">
            ${choice.text}
            </button>
            `;
        }
    });

    document.getElementById("game").innerHTML = html;
}

/* ================= NAVIGATION ================= */

function go(next){

    player.story = next;

    if(!player.visitedLocations.includes(next)){
        player.visitedLocations.push(next);
    }

    if(!player.unlockedLocations.includes(next)){
        player.unlockedLocations.push(next);
    }

    saveGame();

    loadStory();
}

function openWorldMap(){

    let html = `
    <h2>World Map</h2>
    <p>Travel to any unlocked location.</p>
    `;

    const locationNames = {
        village:"Ashmoor Village",
        elder:"Elder's Hut",
        shop:"Village Shop",
        forest:"Dark Forest",
        cryptEntrance:"Ancient Crypt",
        crypt:"Crypt Depths",
        dragonMountain:"Dragon Mountain",
        ending:"Kingdom Plaza"
    };

    player.unlockedLocations.forEach(loc => {

        html += `
        <button onclick="go('${loc}')">
        ${locationNames[loc] || loc}
        </button><br>
        `;
    });

    html += `
    <br>
    <button onclick="loadStory()">Back</button>
    `;

    document.getElementById("game").innerHTML = html;
}

/* ================= EXPLORATION ================= */

function startExploration(area,returnTo){

    returnNode = returnTo;

    if(Math.random() < 0.75){

        startCombat(randomEnemy());

    }else{

        player.inventory.push("Herb");

        updateHUD();

        saveGame();

        document.getElementById("game").innerHTML = `
        <p>You found an Herb!</p>
        <button onclick="endActivity()">Continue</button>
        `;
    }
}

function endActivity(){

    player.story = returnNode;

    saveGame();

    loadStory();
}

/* ================= COMBAT ================= */

function startCombat(enemy){

    currentEnemy = {...enemy};

    renderCombat();

    if(currentEnemy.agi > player.agi){
        enemyTurn();
    }
}

function renderCombat(){

    updateHUD();

    document.getElementById("game").innerHTML = `
    <h2>${currentEnemy.name}</h2>

    <p>Enemy HP: ${currentEnemy.hp}</p>

    <button onclick="attack()">Attack</button>
    <button onclick="defend()">Defend</button>
    <button onclick="run()">Run</button>
    `;
}

function calcDamage(att,def){

    return Math.max(
        1,
        Math.floor(att - (def / 2))
    );
}

function attack(){

    currentEnemy.hp -= calcDamage(
        player.str,
        currentEnemy.def
    );

    if(currentEnemy.hp <= 0){
        winCombat();
        return;
    }

    enemyTurn();
}

function defend(){

    let originalDef = player.def;

    player.def += 3;

    enemyTurn();

    player.def = originalDef;
}

function run(){

    document.getElementById("game").innerHTML = `
    <p>You escaped safely.</p>
    <button onclick="endActivity()">Continue</button>
    `;
}

function enemyTurn(){

    player.hp -= calcDamage(
        currentEnemy.str,
        player.def
    );

    if(player.hp <= 0){

        player.hp = 0;

        updateHUD();

        document.getElementById("game").innerHTML = `
        <h1>GAME OVER</h1>
        <button onclick="location.reload()">Restart</button>
        `;

        return;
    }

    renderCombat();
}

function winCombat(){

    player.xp += currentEnemy.xp;

    let loot = generateLoot(currentEnemy);

    while(player.xp >= player.nextLevelXp){

        player.xp -= player.nextLevelXp;

        player.level++;
        player.skillPoints++;

        player.str += 2;
        player.def += 1;
        player.agi += 2;

        player.maxHp += 7;
        player.hp = player.maxHp;

        player.nextLevelXp = Math.floor(
            player.nextLevelXp * 1.35
        );
    }

    if(currentEnemy.name === "Goblin Chief"){

        player.flags.goblinChiefDead = true;
        player.flags.cryptUnlocked = true;
        player.story = "cryptEntrance";
    }

    if(currentEnemy.name === "Ancient Dragon"){

        player.flags.dragonDead = true;
        player.story = "ending";
    }

    saveGame();

    updateHUD();

    document.getElementById("game").innerHTML = `

    <h2>Victory!</h2>

    <p>You defeated the ${currentEnemy.name}.</p>

    <p>${loot.join("<br>")}</p>

    <button onclick="endAfterBattle()">
    Continue
    </button>
    `;
}

/* ================= ENEMIES ================= */

function randomEnemy(){

    let enemies = [

        {
            name:"Wolf",
            hp:40,
            str:10,
            def:5,
            agi:8,
            xp:15
        },

        {
            name:"Goblin",
            hp:55,
            str:12,
            def:6,
            agi:6,
            xp:20
        },

        {
            name:"Dark Slime",
            hp:35,
            str:8,
            def:3,
            agi:4,
            xp:12
        }

    ];

    if(player.flags.elderQuest && !player.flags.goblinChiefDead){

        if(Math.random() < 0.20){

            return {
                name:"Goblin Chief",
                hp:120,
                str:18,
                def:10,
                agi:10,
                xp:50
            };
        }
    }

    return enemies[
        Math.floor(Math.random() * enemies.length)
    ];
}

/* ================= LOOT ================= */

function generateLoot(enemy){

    let drops = [];

    let gold = Math.floor(Math.random()*20)+5;

    player.gold += gold;

    drops.push(gold + " Gold");

    if(Math.random() < 0.35){

        player.inventory.push("Potion");

        drops.push("Potion");
    }

    if(enemy.name === "Goblin Chief"){

        player.inventory.push("Chief's Blade");

        drops.push("RARE: Chief's Blade");
    }

    return drops;
}

/* ================= SKILLS ================= */

function openSkills(){

    document.getElementById("game").innerHTML = `
    <h2>Skill Tree</h2>

    <p>Available Points: ${player.skillPoints}</p>

    <button onclick="upgrade('str')">+STR</button>
    <button onclick="upgrade('def')">+DEF</button>
    <button onclick="upgrade('agi')">+AGI</button>

    <br><br>

    <button onclick="loadStory()">Back</button>
    `;
}

function upgrade(stat){

    if(player.skillPoints <= 0){

        alert("No skill points!");

        return;
    }

    player[stat] += 2;

    player.skillPoints--;

    saveGame();

    updateHUD();

    openSkills();
}

/* ================= INVENTORY ================= */

function openInventory(){

    let html = `<h2>Inventory</h2>`;

    if(player.inventory.length === 0){

        html += `<p>Empty</p>`;

    }else{

        player.inventory.forEach((item,index) => {

            html += `
            <div style="margin:10px;border:1px solid crimson;padding:10px;">

            <b>${item}</b><br><br>

            <button onclick="useItem(${index})">
            Use
            </button>

            <button onclick="dropItem(${index})">
            Drop
            </button>

            </div>
            `;
        });
    }

    html += `
    <button onclick="loadStory()">Back</button>
    `;

    document.getElementById("game").innerHTML = html;
}

function useItem(index){

    let item = player.inventory[index];

    if(item === "Potion"){

        player.hp += 40;

        if(player.hp > player.maxHp){
            player.hp = player.maxHp;
        }

        alert("You used a Potion!");

        player.inventory.splice(index,1);
    }

    else if(item === "Herb"){

        player.hp += 15;

        if(player.hp > player.maxHp){
            player.hp = player.maxHp;
        }

        alert("You used an Herb!");

        player.inventory.splice(index,1);
    }

    else if(item === "Chief's Blade"){

        player.equipment.weapon = "Chief's Blade";

        alert("Equipped Chief's Blade!");
    }

    saveGame();

    updateHUD();

    openInventory();
}

function dropItem(index){

    let item = player.inventory[index];

    if(confirm("Drop " + item + "?")){

        player.inventory.splice(index,1);

        saveGame();

        updateHUD();

        openInventory();
    }
}

/* ================= SHOP ================= */

function buyPotion(){

    if(player.gold < 15){

        alert("Not enough Gold!");

        return;
    }

    player.gold -= 15;

    player.inventory.push("Potion");

    saveGame();

    updateHUD();

    alert("Potion Purchased!");
}

/* ================= BOSS ================= */

function startDragonFight(){

    startCombat({
        name:"Ancient Dragon",
        hp:300,
        str:35,
        def:18,
        agi:15,
        xp:150
    });
}

/* ================= END BATTLE ================= */

function endAfterBattle(){

    saveGame();

    loadStory();
}

/* ================= GLOBAL BUTTON ACCESS ================= */

window.setClass = setClass;
window.startGame = startGame;
window.go = go;
window.openWorldMap = openWorldMap;
window.openSkills = openSkills;
window.openInventory = openInventory;
window.useItem = useItem;
window.dropItem = dropItem;
window.attack = attack;
window.defend = defend;
window.run = run;
window.endActivity = endActivity;
window.endAfterBattle = endAfterBattle;
window.buyPotion = buyPotion;
window.startDragonFight = startDragonFight;

/* ================= INIT ================= */

updateHUD();

</script>
</body>
</html>
